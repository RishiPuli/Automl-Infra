# CI/CD Pipeline: CloudAutoML
# ─────────────────────────────────────────────────────────────────────────────
# Triggers: every push / PR to main or develop.
#
# Jobs (fan-out after lint-and-test)
# ─────────────────────────────────────────────────────────────────────────────
# 1. lint-and-test     flake8 + full pytest suite with coverage
# 2. docker-build      Dockerfile validity + import smoke-test
# 3. integration-test  CLI end-to-end run, verifies outputs exist
# ─────────────────────────────────────────────────────────────────────────────

name: CloudAutoML CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint & Unit Tests ─────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov httpx pip-audit

      - name: Security audit (dependency CVE scan)
        run: |
          pip-audit --skip-editable --ignore-vuln PYSEC-2022-42969 \
            || echo "[WARN] pip-audit found issues — review before production release"
        continue-on-error: true   # informational; does not fail the build

      - name: Lint with flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=venv,__pycache__,.git,mlruns \
            --extend-ignore=E203,W503,E501

      - name: Run unit tests (all except orchestrator + api integration)
        run: |
          pytest tests/ -v --tb=short \
            --cov=core --cov=utils --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -k "not test_orchestrator and not test_api_server"

      - name: Run API integration tests
        run: |
          pytest tests/test_api_server.py -v --tb=short
        continue-on-error: false

      - name: Run orchestrator integration tests
        run: |
          pytest tests/test_orchestrator.py -v --tb=short
        continue-on-error: false


      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Docker Build & Verify ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cloudautoml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify core imports inside container
        run: |
          docker run --rm cloudautoml:latest python -c "
          import sklearn, xgboost, mlflow, streamlit, psutil, optuna, shap
          from core.orchestrator import run_pipeline
          from core.stability_predictor import StabilityPredictor
          from utils.metrics_logger import log_training_result
          print('All core packages and modules imported successfully.')
          "

  # ── Job 3: CLI Integration Smoke Test ────────────────────────────────────────
  integration-test:
    name: CLI Integration Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CLI pipeline (demo mode — no HPO, no SHAP, no report)
        run: |
          python main.py --no-hpo --no-shap --no-ensemble --no-report

      - name: Verify required output files exist
        run: |
          ls models/
          test -f models/best_model.pkl       && echo "best_model.pkl OK"
          test -f models/deployment_meta.json && echo "deployment_meta.json OK"
          ls reports/
          echo "Pipeline outputs verified."

      - name: Verify inference API starts cleanly
        run: |
          uvicorn inference_api:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health | python -c "
          import sys, json
          body = json.load(sys.stdin)
          assert body['status'] == 'ok', f'Unexpected: {body}'
          print('Health check passed:', body)
          "
          curl -sf http://localhost:8000/model-info | python -c "
          import sys, json
          body = json.load(sys.stdin)
          assert body['loaded'] is True, f'Model should be loaded: {body}'
          print('Model-info check passed:', body)
          "
          curl -sf http://localhost:8000/metrics | python -c "
          import sys, json
          body = json.load(sys.stdin)
          assert 'uptime_seconds' in body, f'/metrics missing uptime_seconds: {body}'
          assert 'error_rate' in body,    f'/metrics missing error_rate: {body}'
          print('/metrics check passed:', list(body.keys()))
          "
          # Verify security headers
          HEADERS=$(curl -sI http://localhost:8000/health)
          echo "$HEADERS" | grep -i 'x-request-id' && echo 'X-Request-ID present'
          echo "$HEADERS" | grep -i 'x-response-time-ms' && echo 'X-Response-Time-MS present'

